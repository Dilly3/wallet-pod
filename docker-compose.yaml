version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: wallet_pod_db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgwpod:/var/lib/postgresql/data

  adminer:
    image: adminer
    ports:
      - "${ADMINER_PORT}:8080"

volumes:
  pgwpod:
